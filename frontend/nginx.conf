# Docker Compose can assign a new container IP whenever the API is recreated.
# The shared upstream zone plus `resolve` makes Nginx refresh that address via
# Docker's embedded DNS instead of retaining the value resolved at startup.
resolver 127.0.0.11 valid=5s ipv6=off;

upstream bookflow_api {
  zone bookflow_api 64k;
  server api:8080 resolve;
}

server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header X-Frame-Options "DENY" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; worker-src 'self' blob:" always;

  location = /healthz { access_log off; default_type text/plain; return 200 "ok\n"; }
  location /api/ {
    proxy_pass http://bookflow_api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_cookie_path / /;
    proxy_read_timeout 60s;
    client_max_body_size 100m;
  }
  location /assets/ { try_files $uri =404; expires 1y; add_header Cache-Control "public, immutable"; }
  location / { try_files $uri $uri/ /index.html; }
}
