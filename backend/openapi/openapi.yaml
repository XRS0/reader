  parameters:
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      description: Caller-supplied UUID; the server validates or replaces it.
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Optional opaque key for replay-safe heartbeats/finishes; a body idempotency_key is also accepted.
      schema:
        type: string
        minLength: 8
        maxLength: 200
      example: 0196d44a-heartbeat-000042
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: Optional weak ETag carrying the current revision, for example W/"8". When valid it overrides body revision.
      schema:
        type: string
      example: W/"8"
    BookId:
      name: bookId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChapterId:
      name: chapterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SessionId:
      name: sessionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EntryId:
      name: entryId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BookmarkId:
      name: bookmarkId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    HighlightId:
      name: highlightId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    NoteId:
      name: noteId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Cursor:
      name: cursor
      in: query
      required: false
      description: Decimal offset cursor returned by this implementation; clients should still treat it as opaque.
      schema:
        type: string
        pattern: ^[0-9]+$
        maxLength: 20
    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50
    Search:
      name: search
      in: query
      required: false
      schema:
        type: string
        maxLength: 200
    DateFrom:
      name: from
      in: query
      required: false
      schema:
        type: string
        format: date-time
    DateTo:
      name: to
      in: query
      required: false
      schema:
        type: string
        format: date-time
    Timezone:
      name: timezone
      in: query
      required: false
      description: IANA timezone name; defaults to UTC.
      schema:
        type: string
        default: UTC
      example: Asia/Yekaterinburg
    BookIdQuery:
      name: book_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssetId:
      name: assetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CsrfToken:
      name: X-CSRF-Token
      in: header
      required: false
      description: Required for unsafe requests authenticated by cookie; omit for bearer or explicit refresh-token requests.
        Must equal the signed readable CSRF cookie.
      schema:
        type: string
        minLength: 32
  headers:
    RequestId:
      description: Request identifier used in logs and traces.
      schema:
        type: string
        format: uuid
      example: 0196d44a-0ee0-7530-9b4a-f4bea9e8e590
    RetryAfter:
      description: Seconds until a retry is allowed.
      schema:
        type: integer
        minimum: 1
      example: 30
    CsrfToken:
      description: Signed double-submit token. Echo this value as X-CSRF-Token for unsafe cookie-authenticated requests.
      schema:
        type: string
    SetCookie:
      description: HttpOnly access/refresh cookies plus the readable signed CSRF cookie. Multiple Set-Cookie header fields
        are emitted.
      schema:
        type: string
    BookDuplicate:
      description: true when the upload matched an existing user-owned SHA-256; false for a newly queued book.
      schema:
        type: boolean
    RevisionETag:
      description: Weak ETag containing the reading-progress revision.
      schema:
        type: string
        pattern: ^W/"[0-9]+"$
      example: W/"8"
    PrivateCache:
      description: Private chapter cache policy.
      schema:
        type: string
      example: private, max-age=300
  responses:
    ValidationError:
      description: Request validation failed
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: VALIDATION_ERROR
              message: Request validation failed
              details: {}
              request_id: 0196d44a-0ee0-7530-9b4a-f4bea9e8e590
    Unauthorized:
      description: Authentication is required or no longer valid
      headers:
        X-Request-ID:
          $ref: '#/components/headers/RequestId'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
