components:
  schemas:
    ErrorCode:
      type: string
      pattern: ^[A-Z][A-Z0-9_]+$
      description: Stable machine-readable code. Clients must tolerate newly added codes.
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              $ref: '#/components/schemas/ErrorCode'
            message:
              type: string
            details:
              description: Structured details or null.
            request_id:
              type: string
              format: uuid
          required:
          - code
          - message
          - details
          - request_id
      required:
      - error
      example:
        error:
          code: BOOK_NOT_FOUND
          message: Book was not found
          details: null
          request_id: 0196d44a-0ee0-7530-9b4a-f4bea9e8e590
    HealthStatus:
      type: object
      properties:
        status:
          type: string
          enum:
          - ok
        time:
          type: string
          format: date-time
      required:
      - status
      - time
    ReadinessStatus:
      type: object
      properties:
        status:
          type: string
          const: ready
      required:
      - status
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        display_name:
          type: string
        locale:
          type: string
          enum:
          - ru
          - en
        timezone:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - email
      - display_name
      - locale
      - timezone
      - created_at
      - updated_at
    Device:
      type: object
      properties:
        id:
          type: string
          format: uuid
        device_key:
          type: string
        name:
          type: string
        user_agent:
          type: string
        last_seen_at:
          type: string
          format: date-time
        revoked_at:
          type:
          - string
          - 'null'
          format: date-time
        created_at:
          type: string
          format: date-time
      required:
      - id
      - device_key
      - name
      - user_agent
      - last_seen_at
      - created_at
    RegisterRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 10
          maxLength: 1024
          writeOnly: true
        display_name:
          type: string
          maxLength: 100
        locale:
          type: string
          enum:
          - en
          - ru
          default: en
        timezone:
          type: string
          default: UTC
          description: IANA timezone name.
        device_key:
          type: string
          maxLength: 200
        device_name:
          type: string
          maxLength: 100
      required:
      - email
      - password
      - display_name
      additionalProperties: false
    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          maxLength: 254
        password:
          type: string
          minLength: 1
          maxLength: 1024
          writeOnly: true
        device_key:
          type: string
          maxLength: 200
        device_name:
          type: string
          maxLength: 100
      required:
      - email
      - password
      additionalProperties: false
    RefreshRequest:
      type: object
      properties:
        refresh_token:
          type: string
          minLength: 32
          writeOnly: true
      description: Non-browser clients may submit an explicit refresh token. Browser cookie auth sends no JSON token and normally
        omits the body.
      additionalProperties: false
    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
        device:
          $ref: '#/components/schemas/Device'
        access_expires_at:
          type: string
          format: date-time
        refresh_expires_at:
          type: string
          format: date-time
      required:
      - user
      - device
      - access_expires_at
      - refresh_expires_at
      description: Safe browser-auth response. Access and refresh token values are set only in HttpOnly cookies and are never
        returned in this JSON body.
    CurrentUserResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/User'
      required:
      - user
    BookFormat:
      type: string
      enum:
      - epub
      - fb2
      - txt
    BookProcessingStatus:
      type: string
      enum:
      - uploaded
      - queued
      - processing
      - ready
      - failed
    BookUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
          description: EPUB, FB2 or UTF-8 TXT; the server verifies extension, MIME and content.
      required:
      - file
    BookSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        author:
          type: string
        format:
          $ref: '#/components/schemas/BookFormat'
        language:
          type: string
        description:
          type: string
        processing_status:
          $ref: '#/components/schemas/BookProcessingStatus'
        processing_error:
          type: string
        added_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        is_favorite:
          type: boolean
        tags:
          type:
          - array
          - 'null'
          items:
            type: string
        progress_percent:
          type: number
          minimum: 0
          maximum: 100
        current_chapter_id:
          type:
          - string
          - 'null'
          format: uuid
        estimated_minutes_remaining:
          type:
          - integer
          - 'null'
          minimum: 0
        last_read_at:
          type:
          - string
          - 'null'
          format: date-time
        original_filename:
          type: string
        original_size:
          type: integer
          minimum: 0
        cover_url:
          type: string
          format: uri
        processing_version:
          type: integer
          minimum: 1
      required:
      - id
      - title
      - author
      - format
      - language
      - processing_status
      - added_at
      - updated_at
      - is_favorite
      - tags
      - progress_percent
      - original_filename
      - original_size
      - processing_version
    BookDetail:
      $ref: '#/components/schemas/BookSummary'
    BookUpdateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 500
        author:
          type: string
          maxLength: 500
        language:
          type: string
          maxLength: 32
        description:
          type: string
          maxLength: 20000
        is_favorite:
          type: boolean
        tags:
          type: array
          items:
            type: string
            maxLength: 100
          maxItems: 20
      additionalProperties: false
    ProcessingStatus:
      type: object
      properties:
        book_id:
          type: string
          format: uuid
        processing_status:
          $ref: '#/components/schemas/BookProcessingStatus'
        processing_error:
          type: string
        processing_version:
          type: integer
          minimum: 1
        updated_at:
          type: string
          format: date-time
      required:
      - book_id
      - processing_status
      - processing_error
      - processing_version
      - updated_at
    BookList:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/BookSummary'
        total_count:
          type: integer
          minimum: 0
        next_cursor:
          type:
          - string
          - 'null'
        has_more:
          type: boolean
      required:
      - items
      - total_count
      - next_cursor
      - has_more
    TocItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        chapter_id:
          type: string
          format: uuid
        title:
          type: string
        level:
          type: integer
          minimum: 0
        order:
          type: integer
          minimum: 0
      required:
      - id
      - chapter_id
      - title
      - level
      - order
    Chapter:
      type: object
      properties:
        id:
          type: string
          format: uuid
        book_id:
          type: string
          format: uuid
        title:
          type: string
        order:
          type: integer
          minimum: 0
        html:
          type: string
        plain_text:
          type: string
        previous_chapter_id:
          type:
          - string
          - 'null'
          format: uuid
        next_chapter_id:
          type:
          - string
          - 'null'
          format: uuid
        word_count:
          type: integer
          minimum: 0
      required:
      - id
      - book_id
      - title
      - order
      - html
      - plain_text
      - previous_chapter_id
      - next_chapter_id
      - word_count
    PresignedDownload:
      type: object
      properties:
        url:
          type: string
          format: uri
        expires_in:
          type: integer
          minimum: 1
      required:
      - url
      - expires_in
    Locator:
      description: Arbitrary valid JSON locator. Individual response DTOs may serialize it as a JSON-text string.
    ReadingProgress:
      type: object
      properties:
        book_id:
          type: string
          format: uuid
        chapter_id:
          type:
          - string
          - 'null'
          format: uuid
        locator_type:
          type: string
        locator:
          type: string
          description: JSON-text representation of the stored locator.
        character_offset:
          type: integer
          minimum: 0
        text_anchor:
          type: string
        progress_percent:
          type: number
          minimum: 0
          maximum: 100
        scroll_percent:
