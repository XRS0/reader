openapi: 3.1.0
jsonSchemaDialect: https://json-schema.org/draft/2020-12/schema
info:
  title: BookFlow API
  version: 0.1.0
  summary: API for a private browser-based ebook reader
  description: Contract for the BookFlow modular monolith. All timestamps are RFC 3339 UTC unless a timezone parameter explicitly
    controls aggregation. Authentication can use the HttpOnly session cookie in browsers or a bearer access token for trusted
    clients. Error responses never expose SQL, stack traces, object-store keys, provider diagnostics, or secrets.
  license:
    name: All rights reserved
    identifier: LicenseRef-Proprietary
servers:
- url: /
  description: Same-origin API (frontend proxy in browser deployments)
security:
- cookieAuth: []
- bearerAuth: []
tags:
- name: Health
  description: Liveness, dependency readiness and Prometheus metrics.
- name: Auth
  description: Registration, token rotation and session revocation.
- name: Books
  description: User-owned uploads, metadata and parsed content.
- name: Reader
  description: Conflict-safe progress and reading preferences.
- name: Reading sessions
  description: Server-time based active/idle accounting.
- name: Translations
  description: Bounded-context word and text translation.
- name: Dictionary
  description: Deduplicated vocabulary and occurrences.
- name: Bookmarks
  description: User-owned saved reading positions.
- name: Highlights
  description: User-owned anchored text highlights.
- name: Notes
  description: Personal, book, highlight and quote notes with versioned blocks.
- name: Statistics
  description: Timezone-aware reading and vocabulary aggregates.
paths:
  /health/live:
    get:
      operationId: getLiveness
      summary: Check process liveness
      tags:
      - Health
      parameters:
      - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Process is alive
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '500':
          $ref: '#/components/responses/InternalError'
        '403':
          $ref: '#/components/responses/Forbidden'
      security: []
  /health/ready:
    get:
      operationId: getReadiness
      summary: Check dependency readiness
      tags:
      - Health
      parameters:
      - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Dependencies are ready
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadinessStatus'
        '503':
          $ref: '#/components/responses/Unavailable'
        '500':
          $ref: '#/components/responses/InternalError'
        '403':
          $ref: '#/components/responses/Forbidden'
      description: Checks PostgreSQL and RustFS connectivity without returning credentials or internal errors.
      security: []
  /metrics:
    get:
      operationId: getMetrics
      summary: Scrape Prometheus metrics
      tags:
      - Health
      parameters:
      - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Prometheus exposition
          content:
            text/plain:
              schema:
                type: string
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
        '500':
          $ref: '#/components/responses/InternalError'
        '403':
          $ref: '#/components/responses/Forbidden'
      description: Deployment should network-restrict this endpoint; it is unauthenticated for Prometheus compatibility.
      security: []
  /api/v1/auth/register:
    post:
      operationId: register
      summary: Register a user
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/RequestId'
      responses:
        '201':
          description: User and browser session created
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
            X-CSRF-Token:
              $ref: '#/components/headers/CsrfToken'
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  email: reader@example.com
                  password: correct horse battery staple
                  display_name: Reader
                  locale: en
                  timezone: Asia/Yekaterinburg
                  device_key: browser-installation-uuid
                  device_name: Firefox on laptop
      security: []
  /api/v1/auth/login:
    post:
      operationId: login
      summary: Log in
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Authenticated; refresh/session cookie is rotated
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
            X-CSRF-Token:
              $ref: '#/components/headers/CsrfToken'
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              default:
                value:
                  email: reader@example.com
                  password: correct horse battery staple
                  device_name: Firefox on laptop
      security: []
  /api/v1/auth/refresh:
    post:
      operationId: refreshSession
      summary: Rotate refresh token
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Session rotated; replacement cookies set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
          headers:
            X-CSRF-Token:
              $ref: '#/components/headers/CsrfToken'
            Set-Cookie:
              $ref: '#/components/headers/SetCookie'
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
      description: Consumes the current refresh token exactly once. Reuse revokes the affected token family.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      security: []
  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Log out this session
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Session revoked
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
  /api/v1/auth/logout-all:
    post:
      operationId: logoutAll
      summary: Log out all devices
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: All sessions and refresh tokens revoked
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/auth/me:
    get:
      operationId: getCurrentUser
      summary: Get current user
      tags:
      - Auth
      parameters:
      - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Current user and device
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/books:
    post:
      operationId: uploadBook
      summary: Upload a book
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '202':
          description: New book accepted for asynchronous processing.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookSummary'
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
            X-Book-Duplicate:
              $ref: '#/components/headers/BookDuplicate'
        '200':
          description: Duplicate upload; existing book returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookSummary'
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
            X-Book-Duplicate:
              $ref: '#/components/headers/BookDuplicate'
        '400':
          $ref: '#/components/responses/ValidationError'
        '413':
          $ref: '#/components/responses/PayloadTooLarge'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '422':
          $ref: '#/components/responses/ValidationError'
      description: Validates size, extension, MIME and signature, computes SHA-256, persists the original, and enqueues processing.
        The original filename is metadata only.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BookUploadRequest'
    get:
      operationId: listBooks
      summary: List books
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/Cursor'
      - $ref: '#/components/parameters/Limit'
      - $ref: '#/components/parameters/Search'
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
      - name: status
        in: query
        required: false
        schema:
          type: string
      - name: format
        in: query
        required: false
        schema:
          type: string
          enum:
          - all
          - epub
          - fb2
          - txt
      - name: sort
        in: query
        required: false
        schema:
          type: string
          enum:
          - added
          - updated
          - last_read
          - title
          - progress
      - name: favorite
        in: query
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: Owned books
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookList'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
  /api/v1/books/{bookId}:
    get:
      operationId: getBook
      summary: Get a book
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Book details
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookDetail'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '400':
          $ref: '#/components/responses/ValidationError'
    patch:
      operationId: updateBook
      summary: Update book metadata
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Updated book
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookDetail'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookUpdateRequest'
    delete:
      operationId: deleteBook
      summary: Delete a book
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '204':
          description: Deletion accepted
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '400':
          $ref: '#/components/responses/ValidationError'
      description: Marks database state for deletion and queues idempotent object cleanup. Never accepts an object key from
        the client.
  /api/v1/books/{bookId}/reprocess:
    post:
      operationId: reprocessBook
      summary: Reprocess a book
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '202':
          description: Reprocessing queued; no response body.
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '400':
          $ref: '#/components/responses/ValidationError'
      description: Creates at most one runnable processing job for the requested source version. Existing original objects
        are preserved on failure.
  /api/v1/books/{bookId}/processing-status:
    get:
      operationId: getBookProcessingStatus
      summary: Get processing status
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Current processing state
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProcessingStatus'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '400':
          $ref: '#/components/responses/ValidationError'
  /api/v1/books/{bookId}/toc:
    get:
      operationId: getBookTableOfContents
      summary: Get table of contents
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Hierarchical table of contents
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TocItem'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '400':
          $ref: '#/components/responses/ValidationError'
  /api/v1/books/{bookId}/chapters/{chapterId}:
    get:
      operationId: getBookChapter
      summary: Get one chapter
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      - $ref: '#/components/parameters/ChapterId'
      responses:
        '200':
          description: Sanitized chapter
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
            Cache-Control:
              $ref: '#/components/headers/PrivateCache'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Chapter'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '400':
          $ref: '#/components/responses/ValidationError'
      description: Returns one sanitized, versioned chapter; it never streams the complete book.
  /api/v1/books/{bookId}/download:
    get:
      operationId: downloadBook
      summary: Create original-file download URL
      tags:
      - Books
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Short-lived presigned URL
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PresignedDownload'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '400':
          $ref: '#/components/responses/ValidationError'
  /api/v1/books/{bookId}/progress:
    get:
      operationId: getReadingProgress
      summary: Get reading progress
      tags:
      - Reader
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Current server progress
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
            ETag:
              $ref: '#/components/headers/RevisionETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingProgress'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '400':
          $ref: '#/components/responses/ValidationError'
    put:
      operationId: putReadingProgress
      summary: Update reading progress
      tags:
      - Reader
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      - $ref: '#/components/parameters/IfMatch'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Progress accepted
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
            ETag:
              $ref: '#/components/headers/RevisionETag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadingProgress'
        '400':
          $ref: '#/components/responses/ValidationError'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ProgressConflict'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      description: Uses revision/If-Match optimistic concurrency. An older revision cannot overwrite newer cross-device state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReadingProgressUpdate'
            examples:
              chapter-offset:
                value:
                  chapter_id: 0196d44a-629e-7be1-8a9d-c61e024b86e2
                  locator_type: chapter_offset
                  locator:
                    character_offset: 1380
                    text_anchor: the quiet river
                  character_offset: 1380
                  progress_percent: 37.42
                  scroll_percent: 61.1
                  revision: 8
                  client_id: web-0196
                  device_id: 0196d44a-240f-7cdd-8365-5dcefa1c60ff
  /api/v1/reader/preferences:
    get:
      operationId: getReaderPreferences
      summary: Get global reader preferences
      tags:
      - Reader
      parameters:
      - $ref: '#/components/parameters/RequestId'
      responses:
        '200':
          description: Global preferences
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReaderPreferences'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
    put:
      operationId: putReaderPreferences
      summary: Replace global reader preferences
      tags:
      - Reader
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Saved preferences
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReaderPreferences'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReaderPreferencesUpdate'
  /api/v1/books/{bookId}/reader-preferences:
    get:
      operationId: getBookReaderPreferences
      summary: Get per-book reader preferences
      tags:
      - Reader
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      responses:
        '200':
          description: Effective book preferences.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReaderPreferences'
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalError'
        '400':
          $ref: '#/components/responses/ValidationError'
    put:
      operationId: putBookReaderPreferences
      summary: Replace per-book reader preferences
      tags:
      - Reader
      parameters:
      - $ref: '#/components/parameters/RequestId'
      - $ref: '#/components/parameters/BookId'
      - $ref: '#/components/parameters/CsrfToken'
      responses:
        '200':
          description: Book preferences saved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReaderPreferences'
          headers:
            X-Request-ID:
              $ref: '#/components/headers/RequestId'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
